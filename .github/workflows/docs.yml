name: Documentation
on:
  push:
    branches:
      - master
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install --upgrade pip mkdocs mkdocs-material mkdocs-static-i18n
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - uses: actions/deploy-pages@v5
        id: deployment
